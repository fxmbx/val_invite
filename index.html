<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Be My Valentine?</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #ffebee;
        font-family: "Arial", sans-serif;
        overflow: hidden;
        text-align: center;
        position: relative;
      }
      h1 {
        color: #d32f2f;
        font-size: 3rem;
      }
      img {
        max-width: 90%;
        height: auto;
      }
      @media (max-width: 768px) {
        h1 {
          font-size: 1.5rem;
        }
        button {
          padding: 12px 24px;
          font-size: 1rem;
        }
        img {
          width: 150px;
        }
        .btn-container {
          width: 100%;
          padding: 0 20px;
        }
        .invitation {
          padding: 20px;
          margin: 0 20px;
        }
        .invitation h2 {
          font-size: 1.2rem;
        }
      }
      .btn-container {
        width: 300px;
        height: 100px;
        margin-top: 20px;
      }
      button {
        padding: 15px 30px;
        font-size: 1.2rem;
        cursor: pointer;
        border: none;
        border-radius: 50px;
        transition: 0.3s;
      }
      #yes-btn {
        background-color: #4caf50;
        color: white;
        margin-right: 20px;
      }
      #yes-btn:hover {
        transform: scale(1.2);
      }
      #no-btn {
        background-color: #f44336;
        color: white;
        position: fixed;
        transition:
          left 0.2s,
          top 0.2s;
      }
      #celebration {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        z-index: 100;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .invitation {
        background: #d32f2f;
        color: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: popIn 0.5s ease-out;
      }
      @keyframes popIn {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="main-content">
      <img
        src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
        alt="heart"
        style="width: 200px; border-radius: 10px; margin-bottom: 20px"
      />
      <h1>Will you be my Valentine? ❤️</h1>
      <div class="btn-container">
        <button id="yes-btn" onclick="celebrate()">YES!</button>
        <button
          id="no-btn"
          onmouseover="moveNoButton()"
          ontouchstart="moveNoButton()"
          onclick="showMistake()"
        >
          No
        </button>
      </div>
    </div>

    <div id="celebration">
      <img
        src="https://media.giphy.com/media/artj92V8o75VPL7AeQ/giphy.gif"
        alt="celebration"
        style="width: 300px; margin-bottom: 20px"
      />
      <h1 style="font-size: 5rem">✨ YAY! ✨</h1>
      <div class="invitation">
        <h2>
          You're invited for an experience of a life time at the castle of love
          💕
        </h2>
        <p><strong>Date:</strong> This Saturday February 14, 2026</p>
        <p><strong>Time:</strong> ☀️ - ♾️</p>
        <p>get ready for an experience like no other ❤️❤️❤️!</p>
        <p style="font-size: 0.9rem; margin-top: 20px">!</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
      function moveNoButton() {
        const btn = document.getElementById("no-btn");
        const currentLeft = btn.offsetLeft;
        const currentTop = btn.offsetTop;

        const isMobile = window.innerWidth <= 768;
        const padding = isMobile ? 10 : 20;
        const btnWidth = isMobile ? 120 : 150;

        const edges = [
          { left: padding + "px", top: padding + "px" },
          { left: padding + "px", top: `calc(100vh - ${btnWidth}px)` },
          { left: `calc(100vw - ${btnWidth}px)`, top: padding + "px" },
          {
            left: `calc(100vw - ${btnWidth}px)`,
            top: `calc(100vh - ${btnWidth}px)`,
          },
        ];

        const farEdges = edges.filter((edge) => {
          const isLeft = currentLeft < window.innerWidth / 2;
          const isTop = currentTop < window.innerHeight / 2;
          const edgeIsLeft =
            edge.left.includes(padding + "px") && !edge.left.includes("calc");
          const edgeIsTop =
            edge.top.includes(padding + "px") && !edge.top.includes("calc");
          return edgeIsLeft !== isLeft || edgeIsTop !== isTop;
        });

        const randomEdge =
          farEdges.length > 0
            ? farEdges[Math.floor(Math.random() * farEdges.length)]
            : edges[Math.floor(Math.random() * edges.length)];
        btn.style.left = randomEdge.left;
        btn.style.top = randomEdge.top;
      }

      function showMistake() {
        alert("It seems you made a mistake 😊");
      }

      function celebrate() {
        {
          {
            fetch("https://formspree.io/f/xkovoegl", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                message: "Someone accepted your Valentine invite! 💕",
              }),
            });
          }
        }

        document.getElementById("celebration").style.display = "flex";

        var duration = 5 * 1000;
        var end = Date.now() + duration;

        (function frame() {
          confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors: ["#ff0000", "#ff69b4"],
          });
          confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors: ["#ff0000", "#ff69b4"],
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        })();
      }
    </script>
  </body>
</html>
